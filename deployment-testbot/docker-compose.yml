services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: netbox
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: netbox
    volumes:
      - netbox-postgres:/var/lib/postgresql/data

  redis:
    image: docker.io/library/redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no

  netbox:
    build:
      context: ${UPSTREAM_CHECKOUT:-..}
      dockerfile: deployment-testbot/Dockerfile
    depends_on:
      - postgres
      - redis
    ports:
      # host 8092 -> container 8080 (gunicorn)
      - "8092:8080"
    environment:
      # Database
      DB_HOST: postgres
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD: netbox
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DATABASE: "0"
      REDIS_CACHE_DATABASE: "1"
      # Django
      SECRET_KEY: testbot-insecure-secret-key-not-for-prod-at-least-50-chars-long!
      ALLOWED_HOSTS: "*"
      # Superuser seeded on first boot
      SUPERUSER_NAME: admin
      SUPERUSER_EMAIL: admin@example.com
      SUPERUSER_PASSWORD: Password123!
    volumes:
      - netbox-static:/opt/netbox/netbox/static
      - netbox-media:/opt/netbox/netbox/media

volumes:
  netbox-postgres:
  netbox-static:
  netbox-media:
